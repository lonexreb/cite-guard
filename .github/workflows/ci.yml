name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check src tests evals
      - name: Type-check (mypy)
        run: uv run mypy src
      - name: Tests + eval gate
        run: uv run pytest -q
