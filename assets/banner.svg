<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CiteGuard — the open watchdog for retracted and problematic citations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f2436"/>
      <stop offset="1" stop-color="#0a2e2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#0ea5a4"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1de9b6"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <style>
      .t { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    </style>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>

  <!-- faint citation-graph motif -->
  <g stroke="#2dd4bf" stroke-width="1.25" opacity="0.10">
    <line x1="980" y1="60" x2="1120" y2="120"/>
    <line x1="1120" y1="120" x2="1060" y2="250"/>
    <line x1="1060" y1="250" x2="920" y2="210"/>
    <line x1="920" y1="210" x2="980" y2="60"/>
    <line x1="1120" y1="120" x2="1210" y2="230"/>
    <line x1="980" y1="60" x2="1060" y2="250"/>
  </g>
  <g fill="#5eead4" opacity="0.16">
    <circle cx="980" cy="60" r="6"/><circle cx="1120" cy="120" r="6"/>
    <circle cx="1060" cy="250" r="6"/><circle cx="920" cy="210" r="6"/>
    <circle cx="1210" cy="230" r="6"/>
  </g>

  <!-- shield with check -->
  <g transform="translate(78,96)">
    <path d="M84 4 L150 30 V96 C150 140 122 168 84 184 C46 168 18 140 18 96 V30 Z" fill="url(#shield)" opacity="0.16"/>
    <path d="M84 4 L150 30 V96 C150 140 122 168 84 184 C46 168 18 140 18 96 V30 Z" fill="none" stroke="url(#shield)" stroke-width="3"/>
    <path d="M52 94 L76 118 L118 62" fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="290" y="138" class="t" font-size="76" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Cite<tspan fill="#34d399">Guard</tspan></text>
  <text x="292" y="188" class="t" font-size="27" font-weight="500" fill="#cbd5e1">The open watchdog for retracted &amp; problematic citations.</text>

  <!-- status pills -->
  <g class="t" font-size="19" font-weight="600">
    <g transform="translate(292,224)">
      <rect width="150" height="40" rx="20" fill="#3b0d0d" stroke="#ef4444" stroke-width="1.2"/>
      <circle cx="24" cy="20" r="6" fill="#ef4444"/>
      <text x="42" y="26" fill="#fca5a5">Retracted</text>
    </g>
    <g transform="translate(456,224)">
      <rect width="158" height="40" rx="20" fill="#3a2a06" stroke="#f59e0b" stroke-width="1.2"/>
      <circle cx="24" cy="20" r="6" fill="#f59e0b"/>
      <text x="42" y="26" fill="#fcd34d">Corrected</text>
    </g>
    <g transform="translate(628,224)">
      <rect width="290" height="40" rx="20" fill="#33290a" stroke="#eab308" stroke-width="1.2"/>
      <circle cx="24" cy="20" r="6" fill="#eab308"/>
      <text x="42" y="26" fill="#fde68a">Expression of concern</text>
    </g>
    <g transform="translate(932,224)">
      <rect width="132" height="40" rx="20" fill="#06281f" stroke="#10b981" stroke-width="1.2"/>
      <circle cx="24" cy="20" r="6" fill="#10b981"/>
      <text x="42" y="26" fill="#6ee7b7">Clean</text>
    </g>
  </g>

  <!-- footer line -->
  <text x="292" y="306" class="mono" font-size="18" fill="#94a3b8">pip install retractguard</text>
  <text x="292" y="334" class="t" font-size="15" fill="#64748b">Retraction Watch · OpenAlex · Crossref — reconciled conservatively · MIT · evals-backed</text>
</svg>
