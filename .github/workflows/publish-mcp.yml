name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for github-oidc auth (no token/secret needed)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
      - name: Validate server.json
        run: ./mcp-publisher validate server.json
      - name: Authenticate (GitHub Actions OIDC → io.github.lonexreb namespace)
        run: ./mcp-publisher login github-oidc
      - name: Publish
        run: ./mcp-publisher publish
